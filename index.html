<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우븐오븐 wovenoven | 살림에 필요한 것을 만들어요 𐃬𖥣</title>
  <meta name="description" content="우븐오븐 공식 쇼핑몰. 커튼·파우치·코스터·앞치마 등 직접 만든 패브릭 소품을 판매합니다. 커튼 주문제작도 가능해요." />
  <link rel="icon" type="image/svg+xml" href="images/brandlogo.svg" />
  <link rel="icon" type="image/png" href="images/brandlogo.png" />
  <link rel="apple-touch-icon" href="images/brandlogo.png" />
  <link rel="canonical" href="https://wovenoven.kr/" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://wovenoven.kr/" />
  <meta property="og:title" content="우븐오븐 wovenoven | 살림에 필요한 것을 만들어요 𐃬𖥣" />
  <meta property="og:description" content="우븐오븐 공식 쇼핑몰. 커튼·파우치·코스터·앞치마 등 직접 만든 패브릭 소품을 판매합니다. 커튼 주문제작도 가능해요." />
  <meta property="og:site_name" content="우븐오븐 wovenoven" />
  <meta name="robots" content="index, follow" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "OnlineStore",
    "name": "우븐오븐 wovenoven",
    "url": "https://wovenoven.kr/",
    "description": "직접 만든 패브릭 소품 쇼핑몰. 커튼, 파우치, 코스터, 앞치마 등.",
    "email": "wovenoven@gmail.com",
    "telephone": "+82-10-3059-2348",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "안산시",
      "addressRegion": "경기도",
      "addressCountry": "KR"
    },
    "sameAs": [
      "https://smartstore.naver.com/wovenoven"
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== CURTAIN INTRO ========== -->
  <div class="curtain-overlay" id="curtainOverlay">
    <div class="c-side c-left">
      <div class="c-body"></div>
      <div class="c-fold-shd"></div>
    </div>
    <div class="c-side c-right">
      <div class="c-body"></div>
    </div>
    <div class="c-info">
      <p class="c-info-tagline" id="cTagline"></p>
      <p class="c-info-brand" id="cBrand"></p>
    </div>
    <p class="curtain-hint">click</p>
  </div>

  <!-- ========== SIDEBAR (데스크탑) ========== -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <img src="images/brandlogo.png" alt="wovenoven logo" class="brand-logo" />
      <p class="tagline" id="sTagline"></p>
      <a href="/" class="logo" id="sLogoText"></a>
    </div>
    <nav class="sidebar-nav">
      <a href="#product" id="sNavProduct" class="nav-active">product</a>
      <a href="#custom" id="sNavCurtain">커튼 주문제작</a>
      <a href="#" target="_blank" rel="noopener" id="sNavNaver">naver store</a>
      <a href="#" target="_blank" rel="noopener" id="sNavInsta">Instagram</a>
    </nav>
    <div class="sidebar-rolling">
      <div class="bounce-shapes">
        <svg class="bounce-shape" style="animation-delay:0s" viewBox="1 5.5 25 17.5" width="18" height="13" xmlns="http://www.w3.org/2000/svg">
          <path d="M9.64158 22.6562L1.30332 5.66329L18.003 5.67469L9.64158 22.6562Z" fill="#074FB7"/>
          <path d="M16.9228 22.6702L8.58458 5.69003L25.2843 5.70143L16.9228 22.6702Z" fill="#074FB7"/>
        </svg>
        <svg class="bounce-shape" style="animation-delay:0.18s" viewBox="0 0 17 17" width="13" height="13" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="8.5" r="8.5" fill="#E9E9E9"/>
        </svg>
        <svg class="bounce-shape" style="animation-delay:0.36s" viewBox="0 0 17 17" width="13" height="13" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8.5" cy="8.5" r="8.5" fill="#E9E9E9"/>
        </svg>
      </div>
    </div>
  </aside>

  <!-- ========== HEADER (모바일) ========== -->
  <header class="mobile-header">
    <a href="/" class="mobile-brand">
      <img src="images/brandlogo.png" alt="wovenoven logo" class="brand-logo-mobile" />
      <span id="mBrandName"></span>
    </a>
    <button class="ham-btn" id="hamBtn" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>
  </header>
  <nav class="mobile-nav" id="mobileNav">
    <a href="#product" id="mNavProduct" class="nav-active">product</a>
    <a href="#custom" id="mNavCurtain">커튼 주문제작</a>
    <a href="#" target="_blank" rel="noopener" id="mNavNaver">naver store</a>
    <a href="#" target="_blank" rel="noopener" id="mNavInsta">Instagram</a>
  </nav>

  <!-- ========== MAIN ========== -->
  <main class="main" id="products">
    <div class="mobile-tagline" id="mTagline"></div>
    <div id="productView">
      <div class="grid" id="productGrid"></div>
    </div>
    <div id="curtainView" style="display:none">
      <div class="co-page">
        <h2 class="co-page-title">Custom Order</h2>

        <div class="co-steps">
          <div class="co-step active" id="coStep1">
            <div class="co-step-dot"></div>
            <span class="co-step-num">01</span>
            <span class="co-step-name">옵션 선택</span>
          </div>
          <div class="co-step-sep"></div>
          <div class="co-step" id="coStep2">
            <div class="co-step-dot"></div>
            <span class="co-step-num">02</span>
            <span class="co-step-name">사이즈 입력</span>
          </div>
          <div class="co-step-sep"></div>
          <div class="co-step" id="coStep3">
            <div class="co-step-dot"></div>
            <span class="co-step-num">03</span>
            <span class="co-step-name">카카오 전송</span>
          </div>
        </div>

        <div class="co-section">
          <p class="co-section-desc">원하는 커튼 형태를 선택해 주세요</p>
          <div class="co-options" id="coOptions"></div>
        </div>

        <div class="co-size-wrap" id="coSizeWrap">
          <div class="co-section">
            <p class="co-section-desc">완성 사이즈 기준으로 입력해 주세요 (단위 : cm)</p>
            <div class="co-size-inputs">
              <div class="co-input-group">
                <label for="coWidth">가로</label>
                <input type="number" id="coWidth" placeholder="0" min="1">
                <span>cm</span>
              </div>
              <div class="co-input-group">
                <label for="coHeight">세로</label>
                <input type="number" id="coHeight" placeholder="0" min="1">
                <span>cm</span>
              </div>
            </div>
          </div>
          <button class="co-send-btn" id="coSendBtn">우븐오븐 채널로 전송</button>
        </div>
        <p class="co-send-hint">전송 버튼을 누르면 입력한 내용이 복사됩니다.<br>카카오톡 채팅창에 붙여넣기만 해주세요!</p>
      </div>
    </div>
  </main>

  <!-- ========== BOUNCE SHAPES (모바일) ========== -->
  <div class="rolling-wrap">
    <div class="bounce-shapes">
      <svg class="bounce-shape" style="animation-delay:0s" viewBox="1 5.5 25 17.5" width="24" height="17" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.64158 22.6562L1.30332 5.66329L18.003 5.67469L9.64158 22.6562Z" fill="#074FB7"/>
        <path d="M16.9228 22.6702L8.58458 5.69003L25.2843 5.70143L16.9228 22.6702Z" fill="#074FB7"/>
      </svg>
      <svg class="bounce-shape" style="animation-delay:0.18s" viewBox="0 0 17 17" width="17" height="17" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="8.5" fill="#E9E9E9"/>
      </svg>
      <svg class="bounce-shape" style="animation-delay:0.36s" viewBox="0 0 17 17" width="17" height="17" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8.5" cy="8.5" r="8.5" fill="#E9E9E9"/>
      </svg>
    </div>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="footer" id="siteFooter"></footer>

  <div class="co-toast" id="coToast">내용이 복사되었어요! 채팅창에 붙여넣기 해주세요 😊</div>

  <script>
    // ═══════════════════════════════════════════════
    //  커튼 인트로 효과
    // ═══════════════════════════════════════════════
    (function () {
      const curtain = document.getElementById('curtainOverlay');
      if (!curtain) return;
      document.documentElement.style.overflow = 'hidden';
      document.body.style.overflow = 'hidden';
      curtain.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
      curtain.addEventListener('wheel', e => e.preventDefault(), { passive: false });
      curtain.addEventListener('click', function () {
        this.classList.add('open');
        setTimeout(() => {
          this.classList.add('gone');
          document.documentElement.style.overflow = '';
          document.body.style.overflow = '';
        }, 1050);
      });
    })();

    // ═══════════════════════════════════════════════
    //  데이터 로드 (어드민에서 저장한 데이터 우선)
    // ═══════════════════════════════════════════════
    const STORAGE_KEY = 'wovenoven_data';

    const DEFAULTS = {
      curtainOrder: {
        kakaoUrl: 'https://pf.kakao.com/_qTxejX/chat',
        options: [
          { type: '일반',  image: 'curtain-basic.jpg' },
          { type: '봉집형', image: 'curtain-bongjip.jpg' },
          { type: '단추형', image: 'curtain-button.jpg' },
        ],
      },
      settings: {
        brandName:     'wovenoven',
        logoText:      'wovenoven.kr',
        tagline:       '안녕하세요, 우브노브 입니다\n불필요한 봉제선 없이,\n살림에 필요한 것만 만들어요 🧵',
        naverStoreUrl: 'https://smartstore.naver.com/',
        instagramUrl:  'https://instagram.com/',
      },
      footer: {
        visible: true,
        company: 'wovenoven', ceo: 'Soyoung Um',
        phone: '+82-10-3059-2348', email: 'wovenoven@gmail.com',
        address: '2F, 8, Bono-ro 4-gil, Ansan-si, Gyeonggi-do', businessNumber: '661-19-02348',
      },
      products: [
        { id: 1, name: '포리 커튼',    englishName: 'Fori Curtain',   description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: true  },
        { id: 2, name: '소리 코스터',  englishName: 'Sori Coaster',   description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: false },
        { id: 3, name: '하트 스폰지',  englishName: 'Heart Sponge',   description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: false },
        { id: 4, name: '노리 쿠션',    englishName: 'Nori Cushion',   description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: true  },
        { id: 5, name: '모리 러그',    englishName: 'Mori Rug',       description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: false },
        { id: 6, name: '타리 냄비받침', englishName: 'Tari Trivet',   description: '', naverUrl: 'https://smartstore.naver.com/', customOrder: false },
      ],
    };

    let siteData = JSON.parse(JSON.stringify(DEFAULTS));

    async function init() {
      // 우선순위: localStorage(어드민 로컬) → data.json(배포 서버) → DEFAULTS
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) { siteData = JSON.parse(stored); }
        else {
          const res = await fetch('./data.json');
          if (res.ok) siteData = await res.json();
        }
      } catch (e) {}
      applySettings();
      renderProducts();
      renderFooter();
      initMobileMenu();
    }
    init();

    // ═══════════════════════════════════════════════
    //  사이트 정보 반영
    // ═══════════════════════════════════════════════
    function applySettings() {
      const s = siteData.settings;
      document.title = (s.brandName || 'wovenoven') + ' | 살림에 필요한 것을 만들어요 𐃬𖥣';

      const taglineEl = document.getElementById('sTagline');
      taglineEl.style.whiteSpace = 'pre-line';
      taglineEl.textContent = s.tagline || '';

      document.getElementById('sLogoText').textContent  = s.logoText  || s.brandName;
      document.getElementById('mBrandName').textContent = s.brandName || 'wovenoven';
      document.getElementById('sNavNaver').href  = s.naverStoreUrl || '#';
      document.getElementById('sNavInsta').href  = s.instagramUrl  || '#';
      document.getElementById('mNavNaver').href  = s.naverStoreUrl || '#';
      document.getElementById('mNavInsta').href  = s.instagramUrl  || '#';

      document.getElementById('mTagline').textContent = s.tagline || '';

      const cTagline = document.getElementById('cTagline');
      const cBrand   = document.getElementById('cBrand');
      if (cTagline) cTagline.textContent = s.tagline   || '';
      if (cBrand)   cBrand.textContent   = s.logoText  || s.brandName || '';

      // 열 수 설정 적용
      const dc = s.gridColsDesktop || 3;
      const mc = s.gridColsMobile  || 2;
      document.documentElement.style.setProperty('--grid-cols-desktop', dc);
      document.documentElement.style.setProperty('--grid-cols-mobile',  mc);
    }

    // ═══════════════════════════════════════════════
    //  상품 그리드 렌더링
    // ═══════════════════════════════════════════════
    function renderProducts() {
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';

      siteData.products.forEach(p => {
        const card = document.createElement('a');
        card.href   = p.naverUrl || '#';
        card.target = '_blank';
        card.rel    = 'noopener noreferrer';
        card.className = 'card';
        card.setAttribute('aria-label', p.name + ' — 네이버 스토어로 이동');

        const imgWrap = document.createElement('div');
        imgWrap.className = 'card-img-wrap';

        const img = document.createElement('img');
        img.alt = p.name;
        img.loading = 'lazy';
        img.dataset.name = p.englishName || '';
        img.dataset.extIdx = '0';
        img.src = `images/${p.englishName || '__none__'}.jpg`;
        img.onerror = function() { tryNextProductImg(this); };

        const overlay = document.createElement('div');
        overlay.className = 'card-overlay';
        overlay.innerHTML = `
          <span class="overlay-name">${p.englishName || p.name}</span>
          ${p.customOrder ? '<span class="badge">주문제작</span>' : ''}
        `;

        imgWrap.appendChild(img);
        imgWrap.appendChild(overlay);

        const info = document.createElement('div');
        info.className = 'card-info';
        info.innerHTML = `
          <p class="card-name">${p.name}</p>
          ${p.description ? `<p class="card-size">${p.description}</p>` : ''}
        `;

        card.appendChild(imgWrap);
        card.appendChild(info);
        grid.appendChild(card);
      });
    }

    function tryNextProductImg(img) {
      const exts = ['png', 'webp', 'jpeg', 'gif'];
      const idx = parseInt(img.dataset.extIdx || '0');
      if (img.dataset.name && idx < exts.length) {
        img.dataset.extIdx = idx + 1;
        img.src = `images/${img.dataset.name}.${exts[idx]}`;
      } else {
        img.style.display = 'none';
      }
    }

    // ═══════════════════════════════════════════════
    //  푸터 렌더링
    // ═══════════════════════════════════════════════
    function renderFooter() {
      const f = siteData.footer;
      const s = siteData.settings;
      const footer = document.getElementById('siteFooter');

      if (f.visible === false) {
        footer.style.display = 'none';
        return;
      }

      footer.style.display = '';
      footer.innerHTML = `
        <p>company &nbsp;${f.company}</p>
        <p>Owner: &nbsp;${f.ceo}</p>
        <p>Business Registration No.: &nbsp;${f.businessNumber}</p>
        <p>Tel: &nbsp;${f.phone}</p>
        <p>Mail: &nbsp;${f.email}</p>
        <p>Address: &nbsp;${f.address}</p>
        <p class="copyright">© 2025 ${s.brandName}. All rights reserved.</p>
      `;
    }

    // ═══════════════════════════════════════════════
    //  모바일 햄버거 메뉴
    // ═══════════════════════════════════════════════
    function initMobileMenu() {
      const hamBtn   = document.getElementById('hamBtn');
      const mobileNav = document.getElementById('mobileNav');

      hamBtn.addEventListener('click', () => {
        const isOpen = mobileNav.classList.toggle('open');
        hamBtn.classList.toggle('active', isOpen);
        hamBtn.setAttribute('aria-label', isOpen ? '메뉴 닫기' : '메뉴 열기');
      });

      mobileNav.querySelectorAll('a').forEach(a => {
        a.addEventListener('click', () => {
          mobileNav.classList.remove('open');
          hamBtn.classList.remove('active');
          hamBtn.setAttribute('aria-label', '메뉴 열기');
        });
      });
    }

    // ═══════════════════════════════════════════════
    //  Hash 기반 라우팅
    // ═══════════════════════════════════════════════
    function getSection() {
      return window.location.hash === '#custom' ? 'curtain' : 'product';
    }

    function showSection(name) {
      document.getElementById('productView').style.display  = name === 'product' ? '' : 'none';
      document.getElementById('curtainView').style.display  = name === 'curtain' ? '' : 'none';
      ['sNavProduct','mNavProduct'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('nav-active', name === 'product');
      });
      ['sNavCurtain','mNavCurtain'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('nav-active', name === 'curtain');
      });
    }

    window.addEventListener('hashchange', () => showSection(getSection()));

    // ═══════════════════════════════════════════════
    //  커튼 주문제작 섹션
    // ═══════════════════════════════════════════════
    function initCurtainOrder() {
      const coData    = siteData.curtainOrder || DEFAULTS.curtainOrder;
      const kakaoUrl  = coData.kakaoUrl || 'https://pf.kakao.com/_qTxejX/chat';
      const optionsCt = document.getElementById('coOptions');
      const sizeWrap  = document.getElementById('coSizeWrap');
      const sendBtn   = document.getElementById('coSendBtn');
      const toast     = document.getElementById('coToast');
      let selectedType = '';
      let toastTimer;

      optionsCt.innerHTML = (coData.options || []).map(opt => `
        <div class="co-option" data-type="${opt.type}">
          ${opt.image ? `<div class="co-option-img"><img src="images/${opt.image}" alt="${opt.type}" onerror="this.parentElement.style.display='none'"></div>` : ''}
          <p class="co-option-name">${opt.type}</p>
        </div>
      `).join('');

      ['sNavCurtain','mNavCurtain'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('click', () => {
          selectedType = '';
          document.querySelectorAll('.co-option').forEach(o => o.classList.remove('selected'));
          sizeWrap.classList.remove('visible');
          if (document.getElementById('coWidth'))  document.getElementById('coWidth').value  = '';
          if (document.getElementById('coHeight')) document.getElementById('coHeight').value = '';
          document.getElementById('coStep2').classList.remove('active');
          document.getElementById('coStep3').classList.remove('active');
        });
      });

      optionsCt.addEventListener('click', e => {
        const opt = e.target.closest('.co-option');
        if (!opt) return;
        document.querySelectorAll('.co-option').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
        selectedType = opt.dataset.type;
        sizeWrap.classList.add('visible');
        document.getElementById('coWidth').value  = '';
        document.getElementById('coHeight').value = '';
        document.getElementById('coWidth').focus();
        document.getElementById('coStep2').classList.add('active');
        document.getElementById('coStep3').classList.add('active');
      });

      sendBtn.addEventListener('click', () => {
        const w = document.getElementById('coWidth').value.trim();
        const h = document.getElementById('coHeight').value.trim();
        if (!w || !h) { alert('가로, 세로 사이즈를 모두 입력해 주세요.'); return; }
        const msg = `[우븐오븐 커튼 주문제작 문의]\n옵션: ${selectedType}\n사이즈: 가로 ${w}cm × 세로 ${h}cm`;

        const showToastAndOpen = () => {
          toast.classList.add('show');
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
          window.open(kakaoUrl, '_blank');
        };

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(msg).then(showToastAndOpen).catch(() => { fallbackCopy(msg); showToastAndOpen(); });
        } else { fallbackCopy(msg); showToastAndOpen(); }
      });

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.focus(); ta.select();
        try { document.execCommand('copy'); } catch(e) {}
        document.body.removeChild(ta);
      }
    }
    initCurtainOrder();
    showSection(getSection());
